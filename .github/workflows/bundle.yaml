name: Bundle

on:
  # Run when a release is published
  release:
    types:
      - published

jobs:
  bundle:
    name: Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3
      - name: Install Roc
        uses: hasnep/setup-roc@main
        with:
          roc-version: nightly
      # Generate the docs for this release and attach them as a release
      # asset. The Pages deploy (deploy-docs.yml) collects these assets to
      # build the versioned docs site -- so each version's docs are frozen
      # here, not committed to the repo. See deploy-docs.yml.
      - name: Generate docs
        env:
          ROC_DOCS_URL_ROOT: /joy-html/${{ github.event.release.tag_name }}
        run: roc docs package/main.roc
      - name: Package docs
        run: tar -czf docs.tar.gz -C generated-docs .
      - name: Upload docs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" docs.tar.gz --repo "${{ github.repository }}"
      - name: Bundle and release the library
        uses: hasnep/bundle-roc-library@v0.2.1
        with:
          library: package/main.roc
          tag: ${{ github.event.release.tag_name }}
          token: ${{ github.token }}
